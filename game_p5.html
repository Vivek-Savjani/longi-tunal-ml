<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Longi-Tunal: Audio Reactive Runner</title>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/addons/p5.sound.min.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  
  <style>
    body { margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; overflow:hidden; background-color: #000; color: white; font-family: 'Consolas', monospace; }
    canvas { display: block; box-shadow: 0 0 20px rgba(0,0,0,0.8); }
  </style>
</head>
<body>

<script>
// --- Themes ---
const THEMES = {
  synthwave: {
    player: [255, 50, 200],
    enemy_low: [0, 180, 255],
    enemy_mid: [57, 255, 20],
    enemy_high: [255, 0, 255],
    bg: [40, 40, 40],
    bg_flash: [70, 70, 70],
    lane_divider: [255, 0, 255]
  },
  ice: {
    player: [200, 255, 255],
    enemy_low: [0, 150, 255],
    enemy_mid: [0, 220, 255],
    enemy_high: [180, 255, 255],
    bg: [5, 15, 40],
    bg_flash: [100, 200, 255],
    lane_divider: [180, 255, 255]
  },
  guitar: {
    player: [255, 215, 0],
    enemy_low: [139, 69, 19],
    enemy_mid: [255, 140, 0],
    enemy_high: [255, 69, 0],
    bg: [30, 15, 5],
    bg_flash: [60, 30, 10],      
    lane_divider: [192, 192, 192]
  }
};

// --- Globals ---
let gameState = "START"; // START, RUNNING, GAME_OVER
let currentThemeName = "ice";
let theme = THEMES[currentThemeName];
let score = 0;
let lastThemeChangeScore = 0;
let spectrum = [];
let ampHistory = [];
const ampHistoryMax = 30;
const pitchLow = 150;
const pitchHigh = 1200;

const lanes = 3;
let laneHeight;
let laneCentres = [];
let trackPosition = 0;
let poseCamera;
let controlMode = "NONE";
const themeNames = ["ice", "synthwave", "guitar"];

// Audio
let mic, fft, amplitude, peakDetect;
let beatPulse = 0;
let smoothedPulse = 0;
let beatWindow = [];
let maxBeatWindowSize = 8;
let lastBeatTime = 0;
let bpm = 10;

// Game Entities
let player;
let enemies = [];
let speed = 5;

// Background specific varsbpm
let iceParticles = [];
let scanLineY = 0;

// --- POSE Tracking Globals ---
let camVideo;
let pose;
let lastWristY = null; 
let wristVelocity = 0;
const strumThresh = 0.05; 
const strumCool = 150;
let lastStrumTime = 0;
let lastStrumDirection = 0;
const reboundCool = 750;
const poseInterval = 100;
let lastPoseTime = 0;

function setup() {
  //frameRate(60)
  createCanvas(windowWidth, windowHeight);
  textFont('Consolas');

  laneHeight = windowHeight / lanes;
  
  for (let i = 0; i < lanes; i++) {
    laneCentres.push((i * laneHeight) + (laneHeight / 2));
  }
  
  // Setup Ice Particles
  for (let i = 0; i < 100; i++) {
    iceParticles.push({ x: random(width), y: random(height), speed: random(1, 3) });
  }

  // Setup Audio
  mic = new p5.AudioIn();
  amplitude = new p5.Amplitude(0.4);
  amplitude.setInput(mic);
  fft = new p5.FFT(0.2, 128);
  fft.setInput(mic);
  peakDetect = new p5.PeakDetect(40, 200, 0.08);
  initBodyTracking(); // Initialize the new Pose tracker
  player = new Player();
}

function draw() {
  // Update Audio Data
  spectrum = fft.analyze();
  peakDetect.update(fft);
  let currentLevel = amplitude.getLevel();
  ampHistory.push(currentLevel);

  if (ampHistory.length > ampHistoryMax) {
    ampHistory.shift();
  }
  
  if (peakDetect.isDetected && gameState === "RUNNING") {
    beatPulse = 1;

    let now = millis();
    if (lastBeatTime !== 0) {
      let interval = now - lastBeatTime;
      beatWindow.push(interval);
      if (beatWindow.length > maxBeatWindowSize) {
        beatWindow.shift();
      }
      let avgInterval = beatWindow.reduce((a,b)=>a+b,0) / beatWindow.length;
      bpm = 60000 / avgInterval;
    }

    lastBeatTime = now;
    speed = map(bpm, 60, 180, 8, 32, true) + sqrt(score);
    spawnEnemy();
  }

  beatPulse *= 0.75;
  if (beatPulse < 0.05) beatPulse = 0;
  smoothedPulse = max(beatPulse, smoothedPulse * 0.85);

  if (gameState === "START") drawStartScreen();
  else if (gameState === "RUNNING") runGame();
  else if (gameState === "GAME_OVER") drawGameOver();

  // Debug Camera View
  push();
  translate(width - 170, height - 130);
  image(camVideo, 0, 0, 160, 120);
  
  // Draw visual indicator for wrist velocity
  strokeWeight(3);
  stroke(255, 0, 0);
  line(80, 60, 80, 60 + (wristVelocity * 600)); 
  
  // Draw threshold markers
  stroke(0, 255, 0);
  line(70, 60 - (strumThresh * 600), 90, 60 - (strumThresh * 600));
  line(70, 60 + (strumThresh * 600), 90, 60 + (strumThresh * 600));
  pop();
}

  // Use a smaller video feed to reduce CPU load
let isPredicting = false; 

function initBodyTracking() {
  camVideo = createCapture(VIDEO);
  camVideo.size(80, 80); 
  camVideo.hide();

  pose = new Pose({
    locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
  });

  pose.setOptions({
    modelComplexity:0,
    smoothLandmarks: true,
    minDetectionConfidence: 0.8, 
    minTrackingConfidence: 0.7
  });

  pose.onResults((results) => {
    onPoseResults(results);
    isPredicting = false;
  });

  poseCamera = new Camera(camVideo.elt, {
    onFrame: async () => {
      let now = millis();
      if (isPredicting || (now - lastPoseTime < poseInterval)) return; 
      isPredicting = true;
      lastPoseTime = now;
      await pose.send({ image: camVideo.elt });
    },
    width: 80,
    height: 80
  });
  poseCamera.start();
}

function onPoseResults(results) {
  if (results.poseLandmarks) {
    let targetWrist = results.poseLandmarks[16]; 

    if (targetWrist && targetWrist.visibility > 0.5) {
      let currentY = targetWrist.y;
      
      if (lastWristY === null) {
        lastWristY = currentY; 
      }

      wristVelocity = currentY - lastWristY;
      lastWristY = currentY; 

      let now = millis();
      if (now - lastStrumTime > strumCool && gameState === "RUNNING") {
        
        // UP STRUM
        if ((wristVelocity < -strumThresh) && !(lastStrumDirection === -1 && (now - lastStrumTime < reboundCool))) {
          if (player.currentLane > 0) {
            player.currentLane--;
            lastStrumTime = now;
            lastStrumDirection = 1;
          }
        } 
        // DOWN STRUM
        else if ((wristVelocity > strumThresh) && !(lastStrumDirection === 1 && (now - lastStrumTime < reboundCool))) {
          if (player.currentLane < lanes - 1) {
            player.currentLane++;
            lastStrumTime = now;
            lastStrumDirection = -1;
          }
        }
      }
    } else {
      lastWristY = null;
      wristVelocity = 0;
    }
  } else {
    lastWristY = null;
    wristVelocity = 0;
  }
}

// --- Main Game Loop ---
function runGame() {
  // Check for theme swap
  if (floor(score) % 15 === 0 && floor(score) !== lastThemeChangeScore && floor(score) > 0) {
    let availableThemes = themeNames.filter(t => t !== currentThemeName);
    currentThemeName = random(availableThemes);
    theme = THEMES[currentThemeName];
    lastThemeChangeScore = floor(score);
  }

  // Draw Background
  if (currentThemeName === "synthwave") drawSynthwaveBg();
  else if (currentThemeName === "ice") drawIceBg();
  else if (currentThemeName === "guitar") drawGuitarBg();


  // Draw Lanes
  stroke(theme.lane_divider[0], theme.lane_divider[1], theme.lane_divider[2], 80);
  strokeWeight(2);
  for (let i = 1; i < lanes; i++) {
    line(0, i * laneHeight, width, i * laneHeight);
  }

  // Update & Draw Player
  player.update();
  player.draw();

  // Update & Draw Enemies
  for (let i = enemies.length - 1; i >= 0; i--) {
    let e = enemies[i];
    e.update(beatPulse);
    e.draw();
    
    // AABB Collision with Player's triangle bounds
    if (e.x < player.x + 50 && e.x + e.w > player.x &&
        e.y < player.y + 25 && e.y + e.h > player.y - 25) {
      gameState = "GAME_OVER";
    }
    
    if (e.x + e.w < 0) {
      enemies.splice(i, 1);
      score += 1; // Gain score for surviving
    }
  }

  // Draw Score
  fill(theme.player);
  noStroke();
  textSize(30);
  textAlign(RIGHT, TOP);
  text(`Score: ${floor(score)}`, width - 20, 20);
}

// --- Background Renderers ---
function drawIceBg() {
  background(theme.bg[0], theme.bg[1], theme.bg[2]);
  
  // Flash overlay
  /*if (beatPulse > 0) {
    fill(theme.bg_flash[0], theme.bg_flash[1], theme.bg_flash[2], beatPulse * 40);
    rect(0, 0, width, height);
  }*/

  // Particles
  fill(theme.lane_divider);
  noStroke();
  for (let p of iceParticles) {
    p.y += p.speed + beatPulse * 2;
    p.x += sin(frameCount * 0.05 + p.x) * 0.5;
    if (p.y > height) { p.y = 0; p.x = random(width); }
    circle(p.x, p.y, 2);
  }

  // Stylized Snowflake in center
  push();
  translate(width / 2, height / 2);
  rotate(frameCount * 0.005);
  let response = pow(smoothedPulse, 0.7);
  let length = 70 + response * 90;
  stroke(theme.lane_divider[0], theme.lane_divider[1], theme.lane_divider[2], 150);
  
  for (let i = 0; i < 6; i++) {
    push();
    rotate((TWO_PI / 6) * i);
    strokeWeight(3);
    line(0, 0, length, 0);
    // Snowflake branches
    strokeWeight(2);
    line(length * 0.6, 0, length * 0.8, length * 0.2);
    line(length * 0.6, 0, length * 0.8, -length * 0.2);
    line(length * 0.3, 0, length * 0.5, length * 0.15);
    line(length * 0.3, 0, length * 0.5, -length * 0.15);
    pop();
  }
  pop();
}

function drawSynthwaveBg() {
  background(theme.bg[0], theme.bg[1], theme.bg[2]);
  let sunY = height * 0.95;
  let response = pow(smoothedPulse, 0.7);
  let coreR = 145 + response * 50;
  
  // Glow
  noStroke();
  fill(theme.player[0], theme.player[1], theme.player[2], 40);
  circle(width/2, sunY, (coreR + beatPulse * 20) * 2.2);

  // Retro Sun (Draw circle, slice with black lines)
  fill(theme.enemy_high);
  circle(width/2, sunY, coreR * 2);
  
  // Cut lines out of the sun
  stroke(theme.bg);
  for (let y = sunY - coreR; y < sunY + coreR; y += 20) {
    let distFromTop = y - (sunY - coreR);
    let lineWeight = map(distFromTop, 0, coreR * 2, 0, 15);
    if (lineWeight > 1) {
      strokeWeight(lineWeight);
      line(width/2 - coreR, y, width/2 + coreR, y);
    }
  }

  // Scanlines
  scanLineY = (scanLineY + 1) % 8;
  stroke(theme.enemy_low[0], theme.enemy_low[1], theme.enemy_low[2], 40);
  strokeWeight(2);
  for (let y = scanLineY; y < height; y += 8) {
    line(0, y, width, y);
  }
}
function drawGuitarBg() {
  background(theme.bg[0], theme.bg[1], theme.bg[2]);  
  let response = pow(max(0, smoothedPulse), 0.7); // (Added max(0) safeguard here too just in case!)
  noStroke();
  fill(15, 5, 0, 150); 

  trackPosition += speed * 0.5;
  
  // Frets
  let fretSpacing = 250; 
  let offset = trackPosition % fretSpacing; 
  for (let x = width - offset + fretSpacing; x > -fretSpacing; x -= fretSpacing) {
    let fretNum = Math.floor((trackPosition + width - x) / fretSpacing); 
    noStroke();
    fill(220, 220, 230, 60 + response * 40);
    circle(x - fretSpacing/2, height/2, 40 + response * 15);
    
    // Metal fret wire
    stroke(120, 120, 130, 150); 
    strokeWeight(6);
    line(x, 0, x, height);
  } 
  // Strings and Lane Highlights
  for(let i = 0; i < lanes; i++) {
    let y = laneCentres[i];
    noStroke();
    fill(theme.lane_divider[0], theme.lane_divider[1], theme.lane_divider[2], 15); 
    rect(0, y - laneHeight/4, width, laneHeight/2); 
    // String wave
    stroke(theme.lane_divider[0], theme.lane_divider[1], theme.lane_divider[2], 180 + response * 75);
    strokeWeight(3 + response * 4);
    noFill();
    beginShape();
    for (let x = 0; x <= width + 20; x += 20) {
      // Vibration
      let amplitude = 3 + (response * 10); 
      let wave = sin(x * 0.015 - frameCount * 0.2 + (i * 2)) * amplitude / 2;
      vertex(x, y + wave);
    }
    endShape();
  }
}
// --- Entities ---
class Player {
  constructor() {
    this.x = 100;
    this.currentLane = floor(lanes / 2); // Start in middle lane
    this.y = laneCentres[this.currentLane];
  }
  
  update() {
    let targetY = laneCentres[this.currentLane];
    // Smooth glide to lane
    this.y = lerp(this.y, targetY, 0.3); 
  }
  
  draw() {
    fill(theme.player);
    noStroke();
    // Draw the Pygame Right-Facing Triangle: [(0,0), (50,25), (0,50)]
    push();
    translate(this.x, this.y - 25); 
    beginShape();
    vertex(0, 0);
    vertex(50, 25);
    vertex(0, 50);
    endShape(CLOSE);
    pop();
  }
}

function spawnEnemy() {
  let nyquist = sampleRate() / 2; // Usually 22050 Hz
  let lowBin = floor(map(pitchLow, 0, nyquist, 0, spectrum.length));
  let highBin = floor(map(pitchHigh, 0, nyquist, 0, spectrum.length));
  
  let maxAmp = 0;
  let peakBin = lowBin;
  
  for (let i = lowBin; i <= highBin; i++) {
    if (spectrum[i] > maxAmp) {
      maxAmp = spectrum[i];
      peakBin = i;
    }
  }
  
  // Convert that bin back into a frequency number
  let peakFreq = map(peakBin, 0, spectrum.length, 0, nyquist);
  
  // Scale it between 0.0 and 1.0, exactly like your Python script
  let scale = (peakFreq - pitchLow) / (pitchHigh - pitchLow);
  let pitch = constrain(scale, 0.0, 1.0);
  
  let pitchTier = 0;
  if (pitch > 0.66) pitchTier = 2; 
  else if (pitch > 0.33) pitchTier = 1; 
  else pitchTier = 0;
  
  // Find the quietest and loudest moments from our recent memory
  let localMin = Math.min(...ampHistory);
  let localMax = Math.max(...ampHistory);
  
  if (localMax - localMin < 0.05) {
    localMax = localMin + 0.05;
  }

  let level = amplitude.getLevel();
  let targetLane = floor(map(level, localMin, localMax, lanes - 1, 0, true));
  
  enemies.push(new Enemy(targetLane, pitchTier));
}

class Enemy {
  constructor(laneIndex, pitchTier) {
    this.x = width;
    this.y = laneCentres[laneIndex] - (laneHeight / 4); // Center vertically
    this.h = laneHeight / 2;
    
    if (pitchTier === 0) {
      this.w = 80; this.colorStr = "enemy_low";
    } else if (pitchTier === 1) {
      this.w = 160; this.colorStr = "enemy_mid";
    } else {
      this.w = 240; this.colorStr = "enemy_high";
    }
  }
  
  update(pulse) {
    this.x -= speed  //+ (pulse * 2); // Micro-stutter forward on beats
  }
  
  draw() {
    let c = theme[this.colorStr];
    fill(c[0], c[1], c[2]);
    noStroke();
    rect(this.x, this.y, this.w, this.h, 10); // border_radius = 10
  }
}

// --- Game States ---
function drawStartScreen() {
  background(theme.bg);
  textAlign(CENTER, CENTER);
  
  fill(theme.player);
  textSize(72);
  text("LONGI - TUNAL", width/2, height/3);
  
  fill(theme.lane_divider);
  textSize(30);
  text("Click to start with camera or Press SPACE to Start with keyboard", width/2, height/2);
  text("UP/DOWN Arrows or SWIPE to Move", width/2, height/2 + 50);
}

function drawGameOver() {
  background(theme.bg[0], theme.bg[1], theme.bg[2], 20); // Fade effect
  textAlign(CENTER, CENTER);
  
  fill(theme.enemy_high);
  textSize(72);
  text("GAME OVER", width/2, height/3);
  
  fill(theme.player);
  textSize(30);
  text(`Score: ${floor(score)}`, width/2, height/2);
  
  fill(theme.lane_divider);
  text("Click to start with camera or Press SPACE to restart with keyboard", width/2, height/2 + 50);
}

// --- Input Handling ---
function keyPressed() {
  if (gameState === "START" || gameState === "GAME_OVER") {
    controlMode = "KEYBOARD";
    userStartAudio(); 
    mic.start();
    if (poseCamera) poseCamera.stop(); // Shutdown pose tracking
    resetGame("ice"); // Default theme for keyboard
    return;
  }

  // Handle Lane Movement (Only allow keyboard movement if in KEYBOARD mode)
  if (gameState === "RUNNING" && controlMode === "KEYBOARD") {
    if ((keyCode === UP_ARROW || key === 'w' || key === 'W') && player.currentLane > 0) {
      player.currentLane--;
    } else if ((keyCode === DOWN_ARROW || key === 's' || key === 'S') && player.currentLane < lanes - 1) {
      player.currentLane++;
    }
  }
}

function mousePressed() {
  if (gameState === "START" || gameState === "GAME_OVER") {
    controlMode = "POSE";
    userStartAudio(); 
    mic.start();
    if (poseCamera) poseCamera.start(); // Ensure pose tracking is ON
    resetGame("guitar"); // Default theme for mouse/pose
  }
}

function resetGame(startingTheme) {
  player = new Player();
  enemies = [];
  score = 0;
  trackPosition = 0;
  lastThemeChangeScore = 0;
  currentThemeName = startingTheme; // Use the theme passed by the input
  theme = THEMES[currentThemeName];
  gameState = "RUNNING";
}
</script>
</body>
