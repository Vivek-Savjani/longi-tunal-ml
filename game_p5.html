<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Longi-Tunal: Audio Reactive Runner</title>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/addons/p5.sound.min.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  
  <style>
    body { margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; overflow:hidden; background-color: #000; color: white; font-family: 'Consolas', monospace; }
    canvas { display: block; box-shadow: 0 0 20px rgba(0,0,0,0.8); }
  </style>
</head>
<body>

<script>
// --- Themes ---
const THEMES = {
  synthwave: {
    player: [255, 50, 200],
    enemy_low: [0, 180, 255],
    enemy_mid: [57, 255, 20],
    enemy_high: [255, 0, 255],
    bg: [40, 40, 40],
    bg_flash: [70, 70, 70],
    lane_divider: [255, 0, 255]
  },
  ice: {
    player: [200, 255, 255],
    enemy_low: [0, 150, 255],
    enemy_mid: [0, 220, 255],
    enemy_high: [180, 255, 255],
    bg: [5, 15, 40],
    bg_flash: [100, 200, 255],
    lane_divider: [180, 255, 255]
  },
guitar: {
    player: [255, 215, 0],
    enemy_low: [225, 175, 110],
    enemy_mid: [245, 235, 215],
    enemy_high: [190, 30, 30],
    bg: [30, 15, 5],
    bg_flash: [60, 30, 10],      
    lane_divider: [192, 192, 192]
  }
};

// --- Globals ---
let gameState = "START"; // START, RUNNING, GAME_OVER
let currentThemeName = "ice";
let theme = THEMES[currentThemeName];
let currentThemeObject; // Holds our active Theme class instance
let score = 0;
let lastThemeChangeScore = 0;
let spectrum = [];
let ampHistory = [];
const ampHistoryMax = 15;
const pitchLow = 150;
const pitchHigh = 1200;

const lanes = 3;
let laneHeight;
let laneCentres = [];
let poseCamera;
let controlMode = "NONE";
const themeNames = ["ice", "synthwave", "guitar"];

// Audio
let mic, fft, amplitude, peakDetect;
let beatPulse = 0;
let smoothedPulse = 0;
let beatWindow = [];
let maxBeatWindowSize = 8;
let lastBeatTime = 0;
let bpm = 10;

// Game Entities
let player;
let enemies = [];
let speed = 5;

// --- POSE Tracking Globals ---
let camVideo;
let pose;
let lastWristY = null; 
let wristVelocity = 0;
const strumThresh = 0.05; 
const strumCool = 150;
let lastStrumTime = 0;
let lastStrumDirection = 0;
const reboundCool = 750;
const poseInterval = 100;
let lastPoseTime = 0;

class Theme {
  constructor(colors) { 
    this.colors = colors;
    this.trackPosition = speed;
   }
  
  drawBackground(beatPulse, smoothedPulse) {}
  drawPlayer(x, y) {}
  drawEnemy(x, y, w, h, colorStr) {}
}

class SynthwaveTheme extends Theme {
  constructor() {
    super(THEMES.synthwave);
    this.scanLineY = 0;
  }

  drawBackground(beatPulse, smoothedPulse) {
    
    this.trackPosition += speed * 0.5;

    background(this.colors.bg[0], this.colors.bg[1], this.colors.bg[2]);
    let sunY = height * 0.95;
    let response = pow(max(0, smoothedPulse), 0.7);
    let breath = sin(this.trackPosition * 0.01) * 10;
    let coreR = 140 + breath + (response * 60);
    
    // Glow
    noStroke();
    fill(this.colors.player[0], this.colors.player[1], this.colors.player[2], 40);
    let glowBreath = sin(this.trackPosition * 0.015) * 15;
    circle(width/2, sunY, (coreR * 2.2) + glowBreath + (beatPulse * 20));

    // Sun 
    fill(this.colors.enemy_high);
    circle(width/2, sunY, (coreR * 2.2) + glowBreath + (beatPulse * 20));
  
    
    // Cut lines out of the sun
    stroke(this.colors.bg);
    for (let y = sunY - coreR; y < sunY + coreR; y += 20) {
      let distFromTop = y - (sunY - coreR);
      let lineWeight = map(distFromTop, 0, coreR * 2, 0, 15);
      if (lineWeight > 1) {
        strokeWeight(lineWeight);
        line(width/2 - coreR, y, width/2 + coreR, y);
      }
    }

    // Scanlines
    this.scanLineY = (this.scanLineY + 1) % 8;
    stroke(this.colors.enemy_low[0], this.colors.enemy_low[1], this.colors.enemy_low[2], 40);
    strokeWeight(2);
    for (let y = this.scanLineY; y < height; y += 8) {
      line(0, y, width, y);
    }
  }
  drawPlayer(x, y) {
      push();
      translate(x, y);
      fill(this.colors.bg); // Hollow center
      stroke(this.colors.player);
      strokeWeight(3);
      
      beginShape();
      vertex(0, -25);
      vertex(50, 0);
      vertex(0, 25);
      vertex(15, 0); // Inner notch
      endShape(CLOSE);
      pop();
    }

  drawEnemy(x, y, w, h, colorStr) {
    push();
    translate(x, y);
    let c = this.colors[colorStr];
    fill(this.colors.bg[0], this.colors.bg[1], this.colors.bg[2], 240);
    stroke(c[0], c[1], c[2]);
    strokeWeight(3);
    rect(0, 0, w, h, 4);
    strokeWeight(1);
    rect(10, 10, w - 20, h - 20, 2);
    
    pop();
  }
}

class IceTheme extends Theme {
  constructor() {
    super(THEMES.ice);
    this.iceParticles = [];
    // Setup Ice Particles
    for (let i = 0; i < 100; i++) {
      this.iceParticles.push({ x: random(windowWidth || 1000), y: random(windowHeight || 800), speed: random(1, 3) });
    }
  }

  drawBackground(beatPulse, smoothedPulse) {
    background(this.colors.bg[0], this.colors.bg[1], this.colors.bg[2]);
    
    // Flash overlay
    /*if (beatPulse > 0) {
      fill(this.colors.bg_flash[0], this.colors.bg_flash[1], this.colors.bg_flash[2], beatPulse * 40);
      rect(0, 0, width, height);
    }*/
    this.trackPosition += speed * 0.5;

    // Particles
    fill(this.colors.lane_divider);
    noStroke();
    for (let p of this.iceParticles) {
      p.y += p.speed + beatPulse * 2;
      p.x += sin(frameCount * 0.05 + p.x) * 0.5;
      if (p.y > height) { p.y = 0; p.x = random(width); }
      circle(p.x, p.y, 2);
    }

    // Stylized Snowflake in center
    push();
    translate(width / 2, height / 2);
    rotate(this.trackPosition * 0.001);;
    let response = pow(max(0, smoothedPulse), 0.7);
    let breath = sin(this.trackPosition * 0.008) * 15;
    let length = 70 + breath + (response * 90);
    stroke(this.colors.lane_divider[0], this.colors.lane_divider[1], this.colors.lane_divider[2], 150);
    
    for (let i = 0; i < 6; i++) {
      push();
      rotate((TWO_PI / 6) * i);
      strokeWeight(3);
      line(0, 0, length, 0);
      // Snowflake branches
      strokeWeight(2);
      let branchSpread = 0.2 + (sin(this.trackPosition * 0.02) * 0.05);
      line(length * 0.6, 0, length * 0.8, length * branchSpread);
      line(length * 0.6, 0, length * 0.8, -length * branchSpread);
      line(length * 0.3, 0, length * 0.5, length * (branchSpread * 0.75));
      line(length * 0.3, 0, length * 0.5, -length * (branchSpread * 0.75));
      pop();
    }
    pop();
  }

drawPlayer(x, y) {
    push();
    translate(x, y);
    fill(this.colors.player[0], this.colors.player[1], this.colors.player[2], 180);
    stroke(255);
    strokeWeight(2);
    
    beginShape();
    vertex(50, 0);
    vertex(15, 25);
    vertex(0, 0);
    vertex(15, -25); 
    endShape(CLOSE);
    pop();
  }

  drawEnemy(x, y, w, h, colorStr) {
    push();
    translate(x, y);
    let c = this.colors[colorStr]; 
    fill(c[0], c[1], c[2], 120);
    stroke(c);
    strokeWeight(2);
    rect(0, 0, w, h, 4);
    
    stroke(255, 255, 255, 200);
    strokeWeight(3);
    line(2, 2, w - 2, 2);
    pop();
  }
}

class GuitarTheme extends Theme {
  constructor() {
    super(THEMES.guitar);
  }

  drawBackground(beatPulse, smoothedPulse) {
    background(this.colors.bg[0], this.colors.bg[1], this.colors.bg[2]);  
    let response = pow(max(0, smoothedPulse), 0.7);
    noStroke();
    fill(15, 5, 0, 150); 

    this.trackPosition += speed * 0.5;
    
    // Frets
    let fretSpacing = 250; 
    let offset = this.trackPosition % fretSpacing; 
    for (let x = width - offset + fretSpacing; x > -fretSpacing; x -= fretSpacing) {
      let fretNum = Math.floor((this.trackPosition + width - x) / fretSpacing); 
      noStroke();
      fill(220, 220, 230, 60 + response * 40);
      circle(x - fretSpacing/2, height/2, 40 + response * 15);
      
      // Metal fret wire
      stroke(120, 120, 130, 150); 
      strokeWeight(6);
      line(x, 0, x, height);
    } 
    
    // Strings and Lane Highlights
    for(let i = 0; i < lanes; i++) {
      let y = laneCentres[i];
      noStroke();
      fill(this.colors.lane_divider[0], this.colors.lane_divider[1], this.colors.lane_divider[2], 15); 
      rect(0, y - laneHeight/4, width, laneHeight/2); 
      // String wave
      stroke(this.colors.lane_divider[0], this.colors.lane_divider[1], this.colors.lane_divider[2], 180 + response * 75);
      strokeWeight(3 + response * 4);
      noFill();
      beginShape();
      for (let x = 0; x <= width + 20; x += 20) {
        // Vibration
        let amplitude = 3 + (response * 10); 
        let wave = sin(x * 0.015 - frameCount * 0.2 + (i * 2)) * amplitude / 2;
        vertex(x, y + wave);
      }
      endShape();
    }
  }

  drawPlayer(x, y) {
    push();
    translate(x, y);
    fill(this.colors.player);
    stroke(255, 255, 255, 150);
    strokeWeight(2);
    beginShape();
    vertex(50, 0); 
    bezierVertex(40, 20, 20, 25, 0, 25); 
    bezierVertex(-10, 15, -10, -15, 0, -25); 
    bezierVertex(20, -25, 40, -20, 50, 0); 
    endShape(CLOSE);
    pop();
  }
  drawEnemy(x, y, w, h, colorStr) {
    push();
    translate(x, y);
    // Amp Cab
    let c = this.colors[colorStr];
    fill(c[0], c[1], c[2], 200);
    stroke(c);
    //stroke(255, 255, 255);
    strokeWeight(4);
    rect(0, 0, w, h, 5);
    
    // Speaker Cones
    let numSpeakers = floor(w / 60) || 1;
    let spkSpacing = w / numSpeakers;
    noStroke();
    
    for(let i = 0; i < numSpeakers; i++) {
      let centerX = (i * spkSpacing) + (spkSpacing / 2);
      let centerY = h / 2;
      
      fill(40); // Outer speaker rim
      circle(centerX, centerY, min(spkSpacing * 0.75, h * 0.75));
      fill(15); // Inner speaker cone
      circle(centerX, centerY, min(spkSpacing * 0.3, h * 0.3));
    }
    pop();
  }
}

function activateTheme(themeName) {
  currentThemeName = themeName;
  theme = THEMES[currentThemeName];
  if (themeName === "synthwave") currentThemeObject = new SynthwaveTheme();
  else if (themeName === "ice") currentThemeObject = new IceTheme();
  else if (themeName === "guitar") currentThemeObject = new GuitarTheme();
}

function setup() {
  createCanvas(windowWidth, windowHeight);
  textFont('Consolas');

  laneHeight = windowHeight / lanes;
  for (let i = 0; i < lanes; i++) {
    laneCentres.push((i * laneHeight) + (laneHeight / 2));
  }
  
  activateTheme(currentThemeName);

  // Setup Audio
  mic = new p5.AudioIn();
  amplitude = new p5.Amplitude(0.4);
  amplitude.setInput(mic);
  fft = new p5.FFT(0.2, 128);
  fft.setInput(mic);
  peakDetect = new p5.PeakDetect(40, 200, 0.08);
  initBodyTracking(); // Initialize the new Pose tracker
  player = new Player();
}

function draw() {
  // Update Audio Data
  spectrum = fft.analyze();
  peakDetect.update(fft);
  let currentLevel = amplitude.getLevel();
  ampHistory.push(currentLevel);

  if (ampHistory.length > ampHistoryMax) {
    ampHistory.shift();
  }
  
  if (peakDetect.isDetected && gameState === "RUNNING") {
    beatPulse = 1;

    let now = millis();
    if (lastBeatTime !== 0) {
      let interval = now - lastBeatTime;
      beatWindow.push(interval);
      if (beatWindow.length > maxBeatWindowSize) {
        beatWindow.shift();
      }
      let avgInterval = beatWindow.reduce((a,b)=>a+b,0) / beatWindow.length;
      bpm = 60000 / avgInterval;
    }

    lastBeatTime = now;
    if (controlMode === "KEYBOARD"){ speed = map(bpm, 60, 180, 8, 32, true) + (score * 0.4);}
    else if (controlMode === "POSE"){ speed = map(bpm, 60, 180, 8, 16, true) + sqrt(score);}
    spawnEnemy();
  }

  beatPulse *= 0.75;
  if (beatPulse < 0.05) beatPulse = 0;
  smoothedPulse = max(beatPulse, smoothedPulse * 0.85);

  if (gameState === "START") drawStartScreen();
  else if (gameState === "RUNNING") runGame();
  else if (gameState === "GAME_OVER") drawGameOver();

  // Debug Camera View
  push();
  translate(width - 170, height - 130);
  image(camVideo, 0, 0, 160, 120);
  
  // Draw visual indicator for wrist velocity
  strokeWeight(3);
  stroke(255, 0, 0);
  line(80, 60, 80, 60 + (wristVelocity * 600)); 
  
  // Draw threshold markers
  stroke(0, 255, 0);
  line(70, 60 - (strumThresh * 600), 90, 60 - (strumThresh * 600));
  line(70, 60 + (strumThresh * 600), 90, 60 + (strumThresh * 600));
  pop();
}

// Use a smaller video feed to reduce CPU load
let isPredicting = false; 

function initBodyTracking() {
  camVideo = createCapture(VIDEO);
  camVideo.size(80, 80); 
  camVideo.hide();

  pose = new Pose({
    locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
  });

  pose.setOptions({
    modelComplexity:0,
    smoothLandmarks: true,
    minDetectionConfidence: 0.8, 
    minTrackingConfidence: 0.7
  });

  pose.onResults((results) => {
    onPoseResults(results);
    isPredicting = false;
  });

  poseCamera = new Camera(camVideo.elt, {
    onFrame: async () => {
      let now = millis();
      if (isPredicting || (now - lastPoseTime < poseInterval)) return; 
      isPredicting = true;
      lastPoseTime = now;
      await pose.send({ image: camVideo.elt });
    },
    width: 80,
    height: 80
  });
  poseCamera.start();
}

function onPoseResults(results) {
  if (results.poseLandmarks) {
    let targetWrist = results.poseLandmarks[16]; 

    if (targetWrist && targetWrist.visibility > 0.5) {
      let currentY = targetWrist.y;
      
      if (lastWristY === null) {
        lastWristY = currentY; 
      }

      wristVelocity = currentY - lastWristY;
      lastWristY = currentY; 

      let now = millis();
      if (now - lastStrumTime > strumCool && gameState === "RUNNING") {
        
        // UP STRUM
        if ((wristVelocity < -strumThresh) && !(lastStrumDirection === -1 && (now - lastStrumTime < reboundCool))) {
          if (player.currentLane > 0) {
            player.currentLane--;
            lastStrumTime = now;
            lastStrumDirection = 1;
          }
        } 
        // DOWN STRUM
        else if ((wristVelocity > strumThresh) && !(lastStrumDirection === 1 && (now - lastStrumTime < reboundCool))) {
          if (player.currentLane < lanes - 1) {
            player.currentLane++;
            lastStrumTime = now;
            lastStrumDirection = -1;
          }
        }
      }
    } else {
      lastWristY = null;
      wristVelocity = 0;
    }
  } else {
    lastWristY = null;
    wristVelocity = 0;
  }
}

// --- Main Game Loop ---
function runGame() {
  // Check for theme swap
  if (floor(score) % 15 === 0 && floor(score) !== lastThemeChangeScore && floor(score) > 0) {
    let availableThemes = themeNames.filter(t => t !== currentThemeName);
    activateTheme(random(availableThemes));
    lastThemeChangeScore = floor(score);
  }

  // Draw Background using current Theme
  currentThemeObject.drawBackground(beatPulse, smoothedPulse);

  // Draw Lanes
  stroke(theme.lane_divider[0], theme.lane_divider[1], theme.lane_divider[2], 80);
  strokeWeight(2);
  for (let i = 1; i < lanes; i++) {
    line(0, i * laneHeight, width, i * laneHeight);
  }

  // Update & Draw Player
  player.update();
  player.draw();

  // Update & Draw Enemies
  for (let i = enemies.length - 1; i >= 0; i--) {
    let e = enemies[i];
    e.update(beatPulse);
    e.draw();
    
    // AABB Collision with Player's triangle bounds
    if (e.x < player.x + 50 && e.x + e.w > player.x &&
        e.y < player.y + 25 && e.y + e.h > player.y - 25) {
      gameState = "GAME_OVER";
    }
    
    if (e.x + e.w < 0) {
      enemies.splice(i, 1);
      score += 1; // Gain score for surviving
    }
  }

  // Draw Score
  fill(theme.player);
  noStroke();
  textSize(30);
  textAlign(RIGHT, TOP);
  text(`Score: ${floor(score)}`, width - 20, 20);
}

// --- Entities ---
class Player {
  constructor() {
    this.x = 100;
    this.currentLane = floor(lanes / 2); // Start in middle lane
    this.y = laneCentres[this.currentLane];
  }
  
  update() {
    let targetY = laneCentres[this.currentLane];
    // Smooth glide to lane
    this.y = lerp(this.y, targetY, 0.3); 
  }
  
  draw() {
    // Delegate to the current theme
    currentThemeObject.drawPlayer(this.x, this.y);
  }
}

function spawnEnemy() {
  let nyquist = sampleRate() / 2; // Usually 22050 Hz
  let lowBin = floor(map(pitchLow, 0, nyquist, 0, spectrum.length));
  let highBin = floor(map(pitchHigh, 0, nyquist, 0, spectrum.length));
  
  let maxAmp = 0;
  let peakBin = lowBin;
  
  for (let i = lowBin; i <= highBin; i++) {
    if (spectrum[i] > maxAmp) {
      maxAmp = spectrum[i];
      peakBin = i;
    }
  }
  
  // Convert that bin back into a frequency number
  let peakFreq = map(peakBin, 0, spectrum.length, 0, nyquist);
  
  // Scale it between 0.0 and 1.0
  let scale = (peakFreq - pitchLow) / (pitchHigh - pitchLow);
  let pitch = constrain(scale, 0.0, 1.0);
  
  let pitchTier = 0;
  if (pitch > 0.55) pitchTier = 2; 
  else if (pitch > 0.45) pitchTier = 1; 
  else pitchTier = 0;
  
  // Find the quietest and loudest moments from recent memory
  let localMin = Math.min(...ampHistory);
  let localMax = Math.max(...ampHistory);
  
  if (localMax - localMin < 0.001) {
    localMax = localMin + 0.0005;
  }

  let level = amplitude.getLevel();
  let targetLane = floor(map(level, localMin, localMax, lanes - 1, 0, true));
  
  enemies.push(new Enemy(targetLane, pitchTier));
}

class Enemy {
  constructor(laneIndex, pitchTier) {
    this.x = width;
    this.y = laneCentres[laneIndex] - (laneHeight / 4); // Center vertically
    this.h = laneHeight / 2;
    
    if (pitchTier === 0) {
      this.w = 80; this.colorStr = "enemy_low";
    } else if (pitchTier === 1) {
      this.w = 160; this.colorStr = "enemy_mid";
    } else {
      this.w = 240; this.colorStr = "enemy_high";
    }
  }
  
  update(pulse) {
    this.x -= speed;
  }
  
  draw() {
    // Delegate to the current theme
    currentThemeObject.drawEnemy(this.x, this.y, this.w, this.h, this.colorStr);
  }
}

// --- Game States ---
function drawStartScreen() {
  background(theme.bg);
  textAlign(CENTER, CENTER);
  
  fill(theme.player);
  textSize(72);
  text("LONGI - TUNAL", width/2, height/3);
  
  fill(theme.lane_divider);
  textSize(30);
  text("Click to start with camera or Press SPACE to Start with keyboard", width/2, height/2);
  text("UP/DOWN Arrows or SWIPE to Move", width/2, height/2 + 50);
}

function drawGameOver() {
  background(theme.bg[0], theme.bg[1], theme.bg[2], 20); // Fade effect
  textAlign(CENTER, CENTER);
  
  fill(theme.enemy_high);
  textSize(72);
  text("GAME OVER", width/2, height/3);
  
  fill(theme.player);
  textSize(30);
  text(`Score: ${floor(score)}`, width/2, height/2);
  
  fill(theme.lane_divider);
  text("Click to start with camera or Press SPACE to restart with keyboard", width/2, height/2 + 50);
}

// --- Input Handling ---
function keyPressed() {
  if (gameState === "START" || gameState === "GAME_OVER") {
    controlMode = "KEYBOARD";
    userStartAudio(); 
    mic.start();
    if (poseCamera) poseCamera.stop(); // Shutdown pose tracking
    resetGame("ice"); // Default theme for keyboard
    return;
  }

  // Handle Lane Movement (Only allow keyboard movement if in KEYBOARD mode)
  if (gameState === "RUNNING" && controlMode === "KEYBOARD") {
    if ((keyCode === UP_ARROW || key === 'w' || key === 'W') && player.currentLane > 0) {
      player.currentLane--;
    } else if ((keyCode === DOWN_ARROW || key === 's' || key === 'S') && player.currentLane < lanes - 1) {
      player.currentLane++;
    }
  }
}

function mousePressed() {
  if (gameState === "START" || gameState === "GAME_OVER") {
    controlMode = "POSE";
    userStartAudio(); 
    mic.start();
    if (poseCamera) poseCamera.start(); // Ensure pose tracking is ON
    resetGame("guitar"); // Default theme for mouse/pose
  }
}

function resetGame(startingTheme) {
  player = new Player();
  enemies = [];
  score = 0;
  lastThemeChangeScore = 0;
  activateTheme(startingTheme); // Safely sets up theme object + variables
  gameState = "RUNNING";
}
</script>
</body>
</html>
